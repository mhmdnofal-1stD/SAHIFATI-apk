<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F4ED">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sahifaty">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>

  <title>sahifaty</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @font-face {
      font-family: "DIN NEXT ARABIC";
      src: url("assets/fonts/DINNextLTArabic-Light.ttf") format("truetype");
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "DIN NEXT ARABIC";
      src: url("assets/fonts/DINNextLTArabic-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "DIN NEXT ARABIC";
      src: url("assets/fonts/DINNextLTArabic-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light;
      --boot-bg: #fcfdf8;
      --boot-surface: rgba(255, 253, 249, 0.94);
      --boot-ink: #1d6652;
      --boot-muted: #688276;
      --boot-accent: #1d6652;
      --boot-accent-soft: rgba(237, 243, 215, 0.94);
      --boot-border: rgba(29, 102, 82, 0.10);
      --boot-shadow: 0 28px 80px rgba(29, 102, 82, 0.12);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top right, rgba(10, 124, 98, 0.10), transparent 24%),
        radial-gradient(circle at bottom left, rgba(19, 34, 56, 0.08), transparent 28%),
        var(--boot-bg);
    }

    body {
      overflow: hidden;
      font-family: "DIN NEXT ARABIC", "Segoe UI", Tahoma, Arial, sans-serif;
    }

    #boot-screen,
    #boot-screen * {
      box-sizing: border-box;
    }

    #boot-screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      z-index: 9999;
      transition: opacity 240ms ease, visibility 240ms ease;
    }

    #boot-screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .boot-card {
      width: min(100%, 440px);
      padding: 28px 24px;
      border-radius: 28px;
      background: var(--boot-surface);
      border: 1px solid var(--boot-border);
      box-shadow: var(--boot-shadow);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .boot-mark {
      width: 88px;
      height: 88px;
      margin: 0 auto 18px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(237, 243, 215, 0.95), rgba(255, 253, 249, 0.98));
      border: 1px solid rgba(29, 102, 82, 0.10);
      box-shadow: 0 18px 34px rgba(29, 102, 82, 0.18);
      padding: 16px;
    }

    .boot-mark svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .boot-title {
      margin: 0;
      color: var(--boot-ink);
      font-size: clamp(28px, 4vw, 34px);
      font-weight: 700;
      line-height: 1.05;
    }

    .boot-subtitle {
      margin: 10px 0 0;
      color: var(--boot-muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .boot-progress {
      width: 100%;
      height: 12px;
      margin-top: 22px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(19, 34, 56, 0.08);
    }

    .boot-progress::after {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(237, 243, 215, 0.55), var(--boot-accent), rgba(47, 123, 100, 0.8));
      animation: boot-slide 1.1s ease-in-out infinite;
    }

    .boot-status {
      margin-top: 18px;
      color: var(--boot-muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .boot-status strong {
      color: var(--boot-ink);
      font-weight: 600;
    }

    .boot-status.is-error {
      color: #9f2d2d;
    }

    .boot-actions {
      display: none;
      justify-content: center;
      margin-top: 18px;
    }

    .boot-actions.is-visible {
      display: flex;
    }

    /* Flutter platform views (iframes, etc.) must always use LTR positioning.
       Setting dir="rtl" on <html> causes flt-glass-pane to be placed at x=1084
       (the right edge of the flutter-view) instead of x=0, because RTL block
       flow starts from the right. This offsets all platform views (Google
       Sign-In button, maps, etc.) outside the visible viewport.
       Fix 1: position flt-glass-pane absolutely so it always covers the canvas
       regardless of the document's text direction.
       Fix 2: force LTR direction on flt-glass-pane so that inline platform views
       (display:inline; position:static) flow from the left rather than the right.
       Without this, flt-platform-view ends up at left=682 in a 464px viewport. */
    flt-glass-pane {
      position: absolute !important;
      inset: 0 !important;
      direction: ltr !important;
    }

    .boot-retry {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      background: var(--boot-accent-soft);
      color: var(--boot-ink);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .boot-retry:hover {
      background: rgba(10, 124, 98, 0.2);
    }

    @keyframes boot-slide {
      0% {
        transform: translateX(-115%);
      }
      100% {
        transform: translateX(255%);
      }
    }

    @media (max-width: 640px) {
      #boot-screen {
        padding: 16px;
      }

      .boot-card {
        padding: 24px 18px;
        border-radius: 24px;
      }
    }
  </style>
  <!-- Apple Sign In JS SDK — required by sign_in_with_apple_web which calls
       AppleID.auth.init() and AppleID.auth.signIn() directly via @JS interop.
       Must be loaded before Flutter initialises so the symbols are available. -->
  <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
</head>
<body>
  <div id="boot-screen" aria-live="polite">
    <div class="boot-card">
      <div class="boot-mark" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 123.49 128" focusable="false">
          <path fill="#1D6652" d="M70.57,115.69c3.4,0,6.15,2.75,6.15,6.15c0,3.4-2.75,6.15-6.15,6.15H25.85c-3.4,0-6.15-2.76-6.15-6.15c0-3.4,2.75-6.15,6.15-6.15H70.57z M71.3,0c28.82,0,52.18,23.36,52.18,52.18c0,28.82-23.36,52.18-52.18,52.18c-0.18,0-0.36,0-0.54,0c-0.07,0-0.13,0-0.2,0H6.15c-3.4,0-6.15-2.76-6.15-6.15c0-3.4,2.76-6.15,6.15-6.15h31.49c-11.33-9.57-18.52-23.88-18.52-39.88C19.12,23.36,42.48,0,71.3,0z M71.3,10.34c-23.11,0-41.85,18.74-41.85,41.85c0,23.11,18.73,41.85,41.85,41.85s41.85-18.73,41.85-41.85C113.15,29.07,94.42,10.34,71.3,10.34z"/>
        </svg>
      </div>
      <h1 class="boot-title">صحيفتي</h1>
      <p class="boot-subtitle">جاري تجهيز التطبيق وتحميل الواجهة بأمان. قد يستغرق ذلك لحظات عند أول فتح.</p>
      <div class="boot-progress" aria-hidden="true"></div>
      <p class="boot-status" id="boot-status"><strong>جاري التحميل...</strong> إذا طال الانتظار فسيظهر لك إجراء مباشر بدل الشاشة البيضاء.</p>
      <div class="boot-actions" id="boot-actions">
        <button class="boot-retry" type="button" onclick="window.location.reload()">إعادة المحاولة</button>
      </div>
    </div>
  </div>
  <noscript>
    <div style="padding: 16px; font-family: sans-serif; line-height: 1.6; text-align: right;">
      يحتاج هذا التطبيق إلى JavaScript للعمل بشكل صحيح. Please enable JavaScript to continue.
    </div>
  </noscript>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function () {
      const bootScreen = document.getElementById('boot-screen');
      const bootStatus = document.getElementById('boot-status');
      const bootActions = document.getElementById('boot-actions');
      let isResolved = false;
      let flutterSurfaceObserver = null;

      function hasFlutterSurface() {
        return Boolean(
          document.querySelector(
            'flutter-view, flt-glass-pane, flt-semantics-host, flt-semantics-placeholder'
          )
        );
      }

      function hideBootScreen() {
        if (!bootScreen || isResolved) {
          return;
        }
        isResolved = true;
        if (flutterSurfaceObserver) {
          flutterSurfaceObserver.disconnect();
          flutterSurfaceObserver = null;
        }
        bootScreen.classList.add('is-hidden');
        window.setTimeout(() => bootScreen.remove(), 260);
      }

      function showBootError(message) {
        if (!bootStatus || !bootActions || isResolved) {
          return;
        }
        bootStatus.classList.add('is-error');
        bootStatus.textContent = message;
        bootActions.classList.add('is-visible');
      }

      function resolveIfFlutterSurfaceReady() {
        if (hasFlutterSurface()) {
          hideBootScreen();
          return true;
        }
        return false;
      }

      window.addEventListener('flutter-first-frame', hideBootScreen);

      flutterSurfaceObserver = new MutationObserver(resolveIfFlutterSurfaceReady);
      flutterSurfaceObserver.observe(document.documentElement, {
        childList: true,
        subtree: true,
      });

      window.addEventListener('load', resolveIfFlutterSurfaceReady, { once: true });
      window.setTimeout(resolveIfFlutterSurfaceReady, 1500);
      window.setTimeout(resolveIfFlutterSurfaceReady, 4000);

      window.addEventListener('error', function (event) {
        if (isResolved || hasFlutterSurface()) {
          return;
        }
        if (event && event.target && event.target !== window) {
          return;
        }
        showBootError('تعذر إكمال تحميل الواجهة. يمكنك إعادة المحاولة الآن بدل البقاء على شاشة بيضاء.');
      });

      window.addEventListener('unhandledrejection', function () {
        if (isResolved || hasFlutterSurface()) {
          return;
        }
        showBootError('تعذر إكمال تحميل الواجهة. يمكنك إعادة المحاولة الآن بدل البقاء على شاشة بيضاء.');
      });

      window.setTimeout(function () {
        if (!isResolved && !hasFlutterSurface() && bootStatus) {
          bootStatus.innerHTML = '<strong>ما زال التحميل جاريًا...</strong> هذا قد يحدث في أول تشغيل أو مع اتصال بطيء.';
        }
      }, 4000);

      window.setTimeout(function () {
        if (!isResolved && !hasFlutterSurface()) {
          showBootError('استغرق التحميل وقتًا أطول من المعتاد. أعد المحاولة، وإن تكرر ذلك فهناك خلل يستحق الفحص.');
        }
      }, 12000);
    }());
  </script>
</body>
</html>

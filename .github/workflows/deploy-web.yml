name: Deploy Flutter Web to Server

on:
  push:
    branches:
      - MajedWithNofal
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and Get Packages
        run: |
          flutter clean
          flutter pub get

      - name: Build Flutter Web (Standard Mode)
        run: |
          # العودة للأمر الافتراضي البسيط والآمن لتفادي أخطاء صياغة المعاملات
          flutter build web --release

      - name: Execute Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          echo "==== جاري نقل ملفات الـ Web الجاهزة إلى السيرفر... ===="
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22" --delete ./build/web/ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}":~/sahifati_web_dist

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22 "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" << 'EOF'
            
            cat << 'INNER_EOF' > ~/nginx_web.conf
            server {
                listen 80;
                server_name localhost;
                location / {
                    root /usr/share/nginx/html;
                    index index.html index.htm;
                    try_files $uri $uri/ /index.html;
                }
            }
            INNER_EOF

            podman stop sahifati_web_container || true
            podman rm sahifati_web_container || true
            
            echo "==== جاري تشغيل حاوية الـ Flutter Web... ===="
            podman run -d \
              --name sahifati_web_container \
              -v ~/sahifati_web_dist:/usr/share/nginx/html:ro \
              -v ~/nginx_web.conf:/etc/nginx/conf.d/default.conf:ro \
              -p 8081:80 \
              nginx:alpine

            echo "========================================="
            podman ps -a --filter name=sahifati_web_container
            echo "========================================="
          EOF

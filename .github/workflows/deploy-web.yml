name: Deploy Flutter Web to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Force Fix Quran Package and Fetch Dependencies
        run: |
          flutter clean
          sed -i 's/quran: ^1.3.1/quran: ^1.4.1/g' pubspec.yaml
          sed -i 's/quran: 1.3.1/quran: 1.4.1/g' pubspec.yaml
          sed -i 's/flutter_lints: ^4.0.0/flutter_lints: ^6.0.0/g' pubspec.yaml
          sed -i 's/flutter_lints: 4.0.0/flutter_lints: 6.0.0/g' pubspec.yaml
          flutter pub get

      - name: Build Flutter Web with Injecting Valid Social Media IDs
        run: |
          # [تم الإصلاح جذرياً] بناء فلاتر ويب مع حقن المعرّفات الجديدة الصحيحة لضمان ظهور وعمل الأيقونات الاجتماعية
          flutter build web --release --base-href "/app/" \
            --dart-define=API_BASE_URL="https://sahifati.org" \
            --dart-define=GOOGLE_WEB_CLIENT_ID="://googleusercontent.com" \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="://googleusercontent.com" \
            --dart-define=APPLE_WEB_CLIENT_ID="org.sahifati.app.signin" \
            --dart-define=APPLE_REDIRECT_URI="https://sahifati.org/auth/social/apple/callback" \
            --dart-define=FACEBOOK_AUTH_ENABLED="true" \
            --dart-define=FACEBOOK_APP_ID="824178674089653" \
            --dart-define=HUAWEI_APP_ID="116918405" \
            --dart-define=HUAWEI_WEB_CLIENT_ID="116918405" \
            --dart-define=HUAWEI_WEB_REDIRECT_URI="https://sahifati.org/auth/social/huawei/callback"

      - name: Execute Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          echo "==== جاري نقل ملفات الـ Web إلى المجلد الحقيقي المستهدف... ===="
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22" --delete ./build/web/ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}":/home/mnofal/sahifaty/sahifaty-users-web/

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22 "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" << 'EOF'
            echo "==== جاري إعادة تنشيط البوابة لمسح الكاش وتطبيق التعديل المتوافق... ===="
            podman restart sahifaty_gateway
            
            echo "========================================="
            echo "تأكيد فحص زوال خطأ الـ Base Href داخلياً:"
            head -n 15 /home/mnofal/sahifaty/sahifaty-users-web/index.html
            echo "========================================="
          EOF

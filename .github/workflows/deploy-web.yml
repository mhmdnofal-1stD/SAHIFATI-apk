name: Deploy Flutter Web to Server

on:
  push:
    branches:
      - MajedWithNofal
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Force Fix Quran Package and Fetch Dependencies
        run: |
          flutter clean
          sed -i 's/quran: ^1.3.1/quran: ^1.4.1/g' pubspec.yaml
          sed -i 's/quran: 1.3.1/quran: 1.4.1/g' pubspec.yaml
          sed -i 's/flutter_lints: ^4.0.0/flutter_lints: ^6.0.0/g' pubspec.yaml
          sed -i 's/flutter_lints: 4.0.0/flutter_lints: 6.0.0/g' pubspec.yaml
          flutter pub get

      - name: Build Flutter Web (Correct Base Href)
        run: |
          # إضافة معامل --base-href لربط مسارات الفلاتر تلقائياً بمسار السيرفر الفرعي /app/ ومنع خطأ 404
          flutter build web --release --base-href "/app/"

      - name: Execute Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          echo "==== جاري نقل ملفات الـ Web إلى المجلد الحقيقي المستهدف... ===="
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22" --delete ./build/web/ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}":/home/mnofal/sahifaty/sahifaty-users-web/

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22 "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" << 'EOF'
            echo "==== جاري إعادة تنشيط البوابة لمسح الكاش وتطبيق التعديل المتوافق... ===="
            podman restart sahifaty_gateway
            
            echo "========================================="
            echo "تأكيد فحص زوال خطأ الـ Base Href داخلياً:"
            head -n 15 /home/mnofal/sahifaty/sahifaty-users-web/index.html
            echo "========================================="
          EOF

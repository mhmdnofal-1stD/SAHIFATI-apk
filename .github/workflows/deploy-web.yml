name: Deploy Flutter Web to Server

on:
  push:
    branches:
      - MajedWithNofal
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Force Fix Quran Package and Fetch Dependencies
        run: |
          flutter clean
          sed -i 's/quran: ^1.3.1/quran: ^1.4.1/g' pubspec.yaml
          sed -i 's/quran: 1.3.1/quran: 1.4.1/g' pubspec.yaml
          sed -i 's/flutter_lints: ^4.0.0/flutter_lints: ^6.0.0/g' pubspec.yaml
          sed -i 's/flutter_lints: 4.0.0/flutter_lints: 6.0.0/g' pubspec.yaml
          flutter pub get

      - name: Build Flutter Web (Standard Mode)
        run: |
          flutter build web --release

      - name: Create Nginx Config Locally
        run: |
          cat << 'EOF' > nginx_web.conf
          server {
              listen 80;
              server_name localhost;
              location / {
                  root /usr/share/nginx/html;
                  index index.html index.htm;
                  try_files $uri $uri/ /index.html;
              }
          }
          EOF

      - name: Execute Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          echo "==== جاري نقل ملفات الـ Web وإعدادات Nginx إلى السيرفر... ===="
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22" --delete ./build/web/ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}":~/sahifati_web_dist
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22" ./nginx_web.conf "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}":~/nginx_web.conf

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22 "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" << 'EOF'
            
            podman stop sahifati_web_container || true
            podman rm sahifati_web_container || true
            
            # قمنا بإعادة توجيه المنفذ ليعمل على المنفذ المطلوب والمفتوح مسبقاً في ملف sahifaty.org الرئيسي
            echo "==== جاري تشغيل حاوية الـ Flutter Web المتوافقة مع إعدادات السيرفر... ===="
            podman run -d \
              --name sahifati_web_container \
              -v ~/sahifati_web_dist:/usr/share/nginx/html:ro \
              -v ~/nginx_web.conf:/etc/nginx/conf.d/default.conf:ro \
              -p 8080:80 \
              nginx:alpine

            echo "========================================="
            podman ps -a --filter name=sahifati_web_container
            echo "========================================="
          EOF

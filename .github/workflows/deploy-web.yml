name: Deploy Flutter Web to Server

on:
  push:
    branches:
      - MajedWithNofal
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Force Fix Quran Package and Fetch Dependencies
        run: |
          flutter clean
          sed -i 's/quran: ^1.3.1/quran: ^1.4.1/g' pubspec.yaml
          sed -i 's/quran: 1.3.1/quran: 1.4.1/g' pubspec.yaml
          sed -i 's/flutter_lints: ^4.0.0/flutter_lints: ^6.0.0/g' pubspec.yaml
          sed -i 's/flutter_lints: 4.0.0/flutter_lints: 6.0.0/g' pubspec.yaml
          flutter pub get

      - name: Build Flutter Web (Standard Mode)
        run: |
          flutter build web --release

      - name: Execute Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # نقل ملفات الـ Web المبنية مباشرة إلى المجلد الفعلي المكتشف بالسيرفر لتبديل النسخة القديمة
          echo "==== جاري نقل ملفات الـ Web إلى المجلد الحقيقي المستهدف... ===="
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22" --delete ./build/web/ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}":/home/mnofal/sahifaty/sahifaty-users-web/

          # الاتصال بالسيرفر لتنشيط البوابة ومسح كاش الذاكرة فوراً
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p 22 "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" << 'EOF'
            echo "==== جاري إعادة تنشيط البوابة لمسح الكاش وتطبيق التعديل الجديد... ===="
            podman restart sahifaty_gateway
            
            echo "========================================="
            echo "تأكيد فحص التحديث داخل المجلد الحقيقي:"
            grep -n "profile_qr_card_title" /home/mnofal/sahifaty/sahifaty-users-web/assets/assets/json/intl_ar.json
            echo "========================================="
          EOF

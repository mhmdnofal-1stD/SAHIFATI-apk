plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

apply plugin: 'com.huawei.agconnect'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

android {
    namespace "org.sahifati.app"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "org.sahifati.app"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutter.versionCode
        versionName flutter.versionName
        resConfigs "ar", "en"
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? rootProject.file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            ndk {
                debugSymbolLevel 'NONE'
            }
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
        exclude 'lib/**/*.so.dbg'
        exclude 'lib/**/*.so.sym'
    }
}

flutter {
    source "../.."
}

// Completely disable native library stripping in bundleRelease
tasks.whenTaskAdded { task ->
    if (task.name.contains('stripNativeLibraries') || 
        task.name == 'stripReleaseNativeLibraries') {
        task.enabled = false
    }
}

afterEvaluate {
    // Disable bundleRelease symbol stripping via gradle properties
    gradle.ext.stripDebugSymbols = false
}

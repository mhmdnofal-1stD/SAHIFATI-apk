plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

apply plugin: 'com.huawei.agconnect'

configurations.configureEach {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'androidx.camera' &&
            details.requested.name in ['camera-core', 'camera-camera2', 'camera-lifecycle']) {
            details.useVersion '1.6.1'
        }
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def resolveKeystoreSetting = { propertyKey, envKey ->
    def envValue = System.getenv(envKey)
    if (envValue != null && !envValue.trim().isEmpty()) {
        return envValue.trim()
    }

    def fileValue = keystoreProperties[propertyKey]
    if (fileValue != null && !fileValue.toString().trim().isEmpty()) {
        return fileValue.toString().trim()
    }

    return null
}

android {
    namespace "org.sahifati.app"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "org.sahifati.app"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutter.versionCode
        versionName flutter.versionName
        resConfigs "ar", "en"
    }

    signingConfigs {
        release {
            def storeFileValue = resolveKeystoreSetting('storeFile', 'SAHIFATI_KEYSTORE_FILE')
            keyAlias resolveKeystoreSetting('keyAlias', 'SAHIFATI_KEY_ALIAS')
            keyPassword resolveKeystoreSetting('keyPassword', 'SAHIFATI_KEY_PASSWORD')
            storeFile storeFileValue ? rootProject.file(storeFileValue) : null
            storePassword resolveKeystoreSetting('storePassword', 'SAHIFATI_KEYSTORE_PASSWORD')
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            ndk {
                abiFilters 'armeabi-v7a', 'arm64-v8a'
                debugSymbolLevel 'NONE'
            }
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
        exclude 'lib/x86_64/*.so'
        exclude '**/x86_64/*.so'
        exclude 'lib/**/*.so.dbg'
        exclude 'lib/**/*.so.sym'
    }
}

flutter {
    source "../.."
}

<svg width="1200" height="80" viewBox="0 0 1200 80" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <!-- Main background -->
  <rect width="1200" height="80" fill="#FBF8F1" fill-opacity="0.5"/>
  
  <!-- Top border decorative line -->
  <path d="M 0 8 L 1200 8" stroke="#B7852A" stroke-width="1.5" opacity="0.7"/>
  <path d="M 0 10 Q 200 12 400 10 T 800 10 T 1200 10" stroke="#B7852A" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Bottom border decorative line -->
  <path d="M 0 72 L 1200 72" stroke="#B7852A" stroke-width="1.5" opacity="0.7"/>
  <path d="M 0 70 Q 200 68 400 70 T 800 70 T 1200 70" stroke="#B7852A" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Left ornament cluster -->
  <g transform="translate(40, 40)">
    <!-- Outer decorative circle -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#B7852A" stroke-width="1.2" opacity="0.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#B7852A" stroke-width="0.8" opacity="0.35"/>
    
    <!-- Islamic geometric petals (8-pointed star style) -->
    <path d="M 0,-20 L -3,-10 L -10,-3 L -20,0 L -10,3 L -3,10 L 0,20 L 3,10 L 10,3 L 20,0 L 10,-3 L 3,-10 Z" 
          fill="#B7852A" opacity="0.25"/>
    
    <!-- Inner star -->
    <circle cx="0" cy="0" r="8" fill="#B7852A" opacity="0.4"/>
    <circle cx="0" cy="0" r="4" fill="#B7852A" opacity="0.6"/>
    
    <!-- Flowing curves extending to the right -->
    <path d="M 28,0 Q 45,-8 65,-6 Q 55,-1 65,0 Q 55,1 65,6 Q 45,8 28,0" 
          stroke="#B7852A" stroke-width="1.2" fill="none" opacity="0.45"/>
    <path d="M 70,-3 Q 90,-5 110,-3 M 70,3 Q 90,5 110,3" 
          stroke="#B7852A" stroke-width="0.8" opacity="0.3"/>
    <path d="M 115,0 L 180,0" stroke="#B7852A" stroke-width="0.6" opacity="0.25" stroke-dasharray="3,5"/>
  </g>
  
  <!-- Right ornament cluster (mirrored) -->
  <g transform="translate(1160, 40) scale(-1, 1)">
    <!-- Outer decorative circle -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#B7852A" stroke-width="1.2" opacity="0.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#B7852A" stroke-width="0.8" opacity="0.35"/>
    
    <!-- Islamic geometric petals (8-pointed star style) -->
    <path d="M 0,-20 L -3,-10 L -10,-3 L -20,0 L -10,3 L -3,10 L 0,20 L 3,10 L 10,3 L 20,0 L 10,-3 L 3,-10 Z" 
          fill="#B7852A" opacity="0.25"/>
    
    <!-- Inner star -->
    <circle cx="0" cy="0" r="8" fill="#B7852A" opacity="0.4"/>
    <circle cx="0" cy="0" r="4" fill="#B7852A" opacity="0.6"/>
    
    <!-- Flowing curves extending to the right -->
    <path d="M 28,0 Q 45,-8 65,-6 Q 55,-1 65,0 Q 55,1 65,6 Q 45,8 28,0" 
          stroke="#B7852A" stroke-width="1.2" fill="none" opacity="0.45"/>
    <path d="M 70,-3 Q 90,-5 110,-3 M 70,3 Q 90,5 110,3" 
          stroke="#B7852A" stroke-width="0.8" opacity="0.3"/>
    <path d="M 115,0 L 180,0" stroke="#B7852A" stroke-width="0.6" opacity="0.25" stroke-dasharray="3,5"/>
  </g>
  
  <!-- Center top decorative flourish -->
  <g transform="translate(600, 10)">
    <path d="M -60,0 Q -45,-4 -30,0 Q -15,2 0,0 Q 15,2 30,0 Q 45,-4 60,0" 
          stroke="#B7852A" stroke-width="1" fill="none" opacity="0.35"/>
    <circle cx="-40" cy="0" r="2" fill="#B7852A" opacity="0.4"/>
    <circle cx="0" cy="0" r="2.5" fill="#B7852A" opacity="0.5"/>
    <circle cx="40" cy="0" r="2" fill="#B7852A" opacity="0.4"/>
  </g>
  
  <!-- Center bottom decorative flourish -->
  <g transform="translate(600, 70)">
    <path d="M -60,0 Q -45,4 -30,0 Q -15,-2 0,0 Q 15,-2 30,0 Q 45,4 60,0" 
          stroke="#B7852A" stroke-width="1" fill="none" opacity="0.35"/>
    <circle cx="-40" cy="0" r="2" fill="#B7852A" opacity="0.4"/>
    <circle cx="0" cy="0" r="2.5" fill="#B7852A" opacity="0.5"/>
    <circle cx="40" cy="0" r="2" fill="#B7852A" opacity="0.4"/>
  </g>
  
  <!-- Small decorative dots along top border -->
  <g opacity="0.3" fill="#B7852A">
    <circle cx="250" cy="9" r="1.5"/>
    <circle cx="350" cy="9" r="1.5"/>
    <circle cx="450" cy="9" r="1.5"/>
    <circle cx="550" cy="9" r="1.5"/>
    <circle cx="650" cy="9" r="1.5"/>
    <circle cx="750" cy="9" r="1.5"/>
    <circle cx="850" cy="9" r="1.5"/>
    <circle cx="950" cy="9" r="1.5"/>
  </g>
  
  <!-- Small decorative dots along bottom border -->
  <g opacity="0.3" fill="#B7852A">
    <circle cx="250" cy="71" r="1.5"/>
    <circle cx="350" cy="71" r="1.5"/>
    <circle cx="450" cy="71" r="1.5"/>
    <circle cx="550" cy="71" r="1.5"/>
    <circle cx="650" cy="71" r="1.5"/>
    <circle cx="750" cy="71" r="1.5"/>
    <circle cx="850" cy="71" r="1.5"/>
    <circle cx="950" cy="71" r="1.5"/>
  </g>
</svg>

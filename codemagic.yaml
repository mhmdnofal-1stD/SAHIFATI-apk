workflows:
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Sahifati ASC Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.sahifati.app
      groups:
        - flutter_secrets
      vars:
        FLUTTER_VERSION: stable
      flutter: stable
      xcode: latest

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Build iOS IPA
        script: |
          BUILD_ARGS=(--release)
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              BUILD_ARGS+=("$line")
            fi
          done < <(dart run tool/generate_flutter_defines.dart --profile=release --config=tool/build_config.json --pubspec=pubspec.yaml)
          flutter build ipa "${BUILD_ARGS[@]}"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Sahifati-External
